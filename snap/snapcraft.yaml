---
# SPDX-License-Identifier: GPL-2.0-only
name: itrue-octoprint
# Need to stick with core24 as Octoprint doesn't support Python 3.14 yet.
base: core24
adopt-info: octoprint
title: OctoPrint
license: AGPL-3.0-only
website: https://octoprint.org
issues: https://github.com/IsaacJT/octoprint-snap/issues
source-code: https://github.com/IsaacJT/octoprint-snap
donation: https://support.octoprint.org
summary: The snappy web interface for your 3D printer.
description: |
  Control and monitor every aspect of your 3D printer and your printing jobs
  right from within your browser.

  ---

  This is a community maintained snap of OctoPrint. The upstream project is
  available at https://octoprint.org/.

grade: devel
confinement: strict

apps:
  octoprint:
    command: bin/start-octoprint.sh
    daemon: simple
    restart-condition: on-failure
    extensions:
      # Required for ffmpeg libraries and acceleration
      - gpu
    plugs:
      - network
      - network-bind
      - raw-usb
      - hardware-observe
      - serial-port
      - camera
      - opengl

parts:
  octoprint:
    plugin: python
    source: octoprint
    override-build: |
      craftctl default
      ver="$("$CRAFT_PART_INSTALL/bin/python" - <<'PY'
      import importlib.metadata
      print(importlib.metadata.version("octoprint"))
      PY
      )"
      craftctl set version="$ver"
      install -D -m 0755 \
        "$CRAFT_PART_SRC/start-octoprint.sh" \
        "$CRAFT_PART_INSTALL/bin/start-octoprint.sh"
    stage-packages:
      - ffmpeg
    # The ffmpeg stage-package pulls in many optional codec/output backends that
    # nothing in the snap links against (text-art display via caca, JACK audio,
    # Theora, FFTW, Google Highway, CMU Flite speech synthesis, etc.). Drop them
    # from the payload to shrink the snap and keep the linters clean. The
    # `usr/lib/*/` glob matches any multiarch triplet (x86_64-linux-gnu,
    # aarch64-linux-gnu, arm-linux-gnueabihf, ...) so this stays arch-agnostic.
    prime:
      - -usr/lib/*/caca/libgl_plugin.so*
      - -usr/lib/*/libcaca++.so*
      - -usr/lib/*/libcjson_utils.so*
      - -usr/lib/*/libfftw3_omp.so*
      - -usr/lib/*/libfftw3_threads.so*
      # Only the unused flite voice/lexicon data; the libflite_cmu_us_* voices
      # are a NEEDED dependency of ffmpeg's libavfilter/libavdevice, so keep
      # them or ffmpeg fails to load.
      - -usr/lib/*/libflite_cmu_grapheme_lang.so*
      - -usr/lib/*/libflite_cmu_grapheme_lex.so*
      - -usr/lib/*/libflite_cmu_indic_lang.so*
      - -usr/lib/*/libflite_cmu_indic_lex.so*
      - -usr/lib/*/libflite_cmu_time_awb.so*
      - -usr/lib/*/libhwy_contrib.so*
      - -usr/lib/*/libhwy_test.so*
      - -usr/lib/*/libjacknet.so*
      - -usr/lib/*/libjackserver.so*
      - -usr/lib/*/libpulse-simple.so*
      - -usr/lib/*/libsphinxad.so*
      - -usr/lib/*/libtheora.so*
      - -usr/lib/*/libzvbi-chains.so*
    python-packages:
      - octoprint
      # Bundled so the runtime venv can import it (via the layered .pth) to
      # install user plugins; see octoprint/start-octoprint.sh.
      - pip
